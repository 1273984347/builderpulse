name: Update Feeds
on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Sources to update'
        type: choice
        options: [all, twitter, podcast, blog]

# CodeQL: principle of least privilege. Read repo contents; on failure,
# escalate to issues:write so the cron-failure notification step can create
# or comment on a tracking issue.
permissions:
  contents: read
  issues: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e ".[sources]"
      - run: python scripts/update_feeds.py
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

      # On cron failure, open or update a tracking issue so maintainers get
      # notified instead of silent fails (Session 35 lesson: 5 consecutive
      # daily runs failed before anyone noticed). Dedupe by looking for an
      # existing OPEN issue with the same label; if found, comment on it,
      # otherwise create a new one. Permissions are scoped at the job level.
      - name: Notify maintainer on cron failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'cron-failure';
            const titlePrefix = 'Update Feeds cron failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Cron run **failed** on \`${new Date().toISOString()}\`.`,
              ``,
              `**Run URL**: ${runUrl}`,
              ``,
              `Use \`gh run view ${context.runId} --log-failed\` to see what broke.`,
              ``,
              `_This issue was auto-created by the Update Feeds workflow. ` +
              `It will not auto-close; close it manually after triage._`
            ].join('\n');

            // 1) Look for an existing OPEN issue with this label + title prefix.
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 10,
            });
            const existing = issues.data.find(i => i.title.startsWith(titlePrefix));

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Another failure at \`${new Date().toISOString()}\`: ${runUrl}`,
              });
              console.log(`Commented on existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${titlePrefix} at ${new Date().toISOString()}`,
                body: body,
                labels: [label],
              });
              console.log(`Created issue #${created.data.number}`);
            }
