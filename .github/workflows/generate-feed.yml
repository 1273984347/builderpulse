name: Update Feeds
on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Sources to update'
        type: choice
        options: [all, twitter, podcast, blog]

# CodeQL: principle of least privilege — only read repo contents.
permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e ".[sources]"
      - run: python scripts/update_feeds.py
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
