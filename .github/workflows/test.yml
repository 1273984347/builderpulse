name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CodeQL: principle of least privilege — only read repo contents.
permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-24.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ffmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ffmpeg
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ --ignore=tests/test_transcribers.py -v
      - name: Check linting
        run: ruff check src/ tests/
      - name: Verify pyproject.toml format + entry_points sort
        run: |
          python scripts/check_pyproject_format.py
          python scripts/check_entry_points_sorted.py
