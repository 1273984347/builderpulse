name: GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'README.zh-CN.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: |
          mkdir -p _site
          cp README.md _site/index.md
          cp README.zh-CN.md _site/zh-CN.md
          cp -r docs/* _site/ 2>/dev/null || true
          echo "# BuilderPulse" > _site/index.html
          echo "<p>AI Content Aggregation Platform</p>" >> _site/index.html
          echo "<p><a href='https://github.com/1273984347/builderpulse'>GitHub</a></p>" >> _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
